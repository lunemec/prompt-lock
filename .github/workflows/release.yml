name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Validate
        run: |
          make validate-final
          make production-readiness-gate
          STATE_DIR="${RUNNER_TEMP}/promptlock-release-state"
          AUDIT_DIR="${RUNNER_TEMP}/promptlock-release-audit"
          make storage-fsync-release-gate MOUNT_DIRS="${STATE_DIR},${AUDIT_DIR}" FSYNC_REPORT=reports/storage-fsync-report-release-ci.json

      - name: Build artifacts
        run: |
          VERSION=${GITHUB_REF_NAME}
          chmod +x scripts/release-package.sh
          scripts/release-package.sh "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: promptlock-${{ github.ref_name }}
          path: |
            dist/*.tar.gz
            reports/storage-fsync-report-release-ci.json
