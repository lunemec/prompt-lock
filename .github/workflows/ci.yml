name: ci

on:
  pull_request:
  push:
    branches: ["master", "main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load toolchain versions
        run: |
          while IFS= read -r line; do
            case "$line" in
              ''|\#*) continue ;;
              *) echo "$line" >> "$GITHUB_ENV" ;;
            esac
          done < .toolchain.env

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Go version
        run: go version

      - name: Release-readiness core gate
        run: make release-readiness-gate-core

      - name: Docker E2E compose
        run: make e2e-compose

      - name: Leak guard
        run: make leak-guard

      - name: MCP conformance report
        run: make mcp-conformance-report

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: reports/mcp-conformance.json
          if-no-files-found: ignore
